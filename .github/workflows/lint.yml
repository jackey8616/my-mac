name: Lint

on:
  push:
  pull_request:

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        # Scans shell scripts repo-wide (it picks up *.zsh too, not just *.sh).
        # The shell/ dir holds zsh config (shell/my-mac.zsh) with zsh-only syntax
        # ShellCheck can't parse, so exclude it.
        uses: ludeeus/action-shellcheck@master
        with:
          ignore_paths: shell
